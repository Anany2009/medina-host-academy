u0629 \u0625\u0633\u0639\u0627\u0641\u0627\u062A \u0623\u0648\u0644\u064A\u0629 \u062C\u0627\u0647\u0632\u0629 \u0648\u0645\u0639\u0631\u0641\u0629 \u0623\u0633\u0627\u0633\u064A\u0629 \u0628\u0627\u0633\u062A\u062E\u062F\u0627\u0645\u0647\u0627 \u0642\u062F \u064A\u0643\u0648\u0646 \u0627\u0644\u0641\u0627\u0631\u0642 \u0628\u064A\u0646 \u0645\u0648\u0642\u0641 \u0628\u0633\u064A\u0637 \u0648\u0623\u0632\u0645\u0629 \u062D\u0642\u064A\u0642\u064A\u0629.","\u064A\u062C\u0628 \u0623\u0646 \u062A\u062A\u0648\u0641\u0631 \u062D\u0642\u064A\u0628\u0629 \u0625\u0633\u0639\u0627\u0641\u0627\u062A \u0623\u0648\u0644\u064A\u0629 \u0623\u0633\u0627\u0633\u064A\u0629 \u062A\u0634\u0645\u0644: \u0636\u0645\u0627\u062F\u0627\u062A\u060C \u0645\u0637\u0647\u0631\u060C \u0644\u0627\u0635\u0642 \u062C\u0631\u0648\u062D\u060C \u0642\u0641\u0627\u0632\u0627\u062A\u060C \u0645\u0642\u0635\u060C \u0648\u0643\u0645\u0627\u062F\u0627\u062A \u0628\u0627\u0631\u062F/\u0633\u0627\u062E\u0646 \u0641\u0648\u0631\u064A.","\u0645\u0646 \u0627\u0644\u0636\u0631\u0648\u0631\u064A \u0645\u0639\u0631\u0641\u0629 \u0627\u0644\u062E\u0637\u0648\u0627\u062A \u0627\u0644\u0623\u0633\u0627\u0633\u064A\u0629 \u0644\u0644\u062A\u0639\u0627\u0645\u0644 \u0645\u0639: \u0627\u0644\u062C\u0631\u0648\u062D \u0627\u0644\u0633\u0637\u062D\u064A\u0629\u060C \u0627\u0644\u062D\u0631\u0648\u0642 \u0627\u0644\u062E\u0641\u064A\u0641\u0629\u060C \u0627\u0644\u0625\u063A\u0645\u0627\u0621\u060C \u0648\u0627\u0644\u0627\u062E\u062A\u0646\u0627\u0642 (\u0627\u0644\u062D\u0631\u0643\u0629 \u0627\u0644\u0644\u0627\u0632\u0645\u0629 \u0644\u0625\u0646\u0639\u0627\u0634 \u0645\u062C\u0631\u0649 \u0627\u0644\u0647\u0648\u0627\u0621).","\u064A\u064F\u0641\u0636\u0651\u0644 \u0628\u0634\u062F\u0629 \u2014 \u0648\u0647\u0648 \u0625\u0644\u0632\u0627\u0645\u064A \u0644\u0645\u0633\u062A\u0648\u0649 \u0627\u0644\u0630\u0647\u0628\u064A \u0648\u0627\u0644\u0645\u0627\u0633\u064A \u2014 \u0623\u0646 \u064A\u0643\u0648\u0646 \u0623\u062D\u062F \u0623\u0641\u0631\u0627\u062F \u0627\u0644\u0623\u0633\u0631\u0629 \u0627\u0644\u0645\u0633\u062A\u0636\u064A\u0641\u0629 \u062D\u0627\u0635\u0644\u064B\u0627 \u0639\u0644\u0649 \u0634\u0647\u0627\u062F\u0629 \u0625\u0633\u0639\u0627\u0641\u0627\u062A \u0623\u0648\u0644\u064A\u0629 \u0623\u0648 CPR \u0633\u0627\u0631\u064A\u0629 \u0627\u0644\u0645\u0641\u0639\u0648\u0644.","\u0639\u0646\u062F \u0623\u064A \u062D\u0627\u0644\u0629 \u0637\u0628\u064A\u0629 \u062A\u062A\u062C\u0627\u0648\u0632 \u0627\u0644\u0625\u0633\u0639\u0627\u0641\u0627\u062A \u0627\u0644\u0623\u0648\u0644\u064A\u0629\u060C \u064A\u062C\u0628 \u0627\u0644\u0627\u062A\u0635\u0627\u0644 \u0628\u0627\u0644\u0625\u0633\u0639\u0627\u0641 \u0641\u0648\u0631\u064B\u0627 \u0639\u0644\u0649 \u0627\u0644\u0631\u0642\u0645 997 \u0648\u0625\u0634\u0639\u0627\u0631 \u0627\u0644\u0645\u0646\u0635\u0629 \u0641\u064A \u0646\u0641\u0633 \u0627\u0644\u0648\u0642\u062A \u2014 \u0644\u0627 \u062A\u0646\u062A\u0638\u0631 \u062D\u062A\u0649 \u062A\u062A\u0623\u0643\u062F \u0645\u0646 \u062E\u0637\u0648\u0631\u0629 \u0627\u0644\u062D\u0627\u0644\u0629\u060C \u0641\u0627\u0644\u0627\u062A\u0635\u0627\u0644 \u0627\u0644\u0645\u0628\u0643\u0631 \u062F\u0627\u0626\u0645\u064B\u0627 \u0647\u0648 \u0627\u0644\u062E\u064A\u0627\u0631 \u0627\u0644\u0623\u0643\u062B\u0631 \u0623\u0645\u0627\u0646\u064B\u0627."]},{id:"3-4",title:"\u0633\u0644\u0627\u0645\u0629 \u0627\u0644\u0623\u0637\u0641\u0627\u0644 \u0648\u0627\u0644\u0646\u0633\u0627\u0621",durationMin:15,body:["\u062A\u062E\u062A\u0644\u0641 \u0627\u062D\u062A\u064A\u0627\u062C\u0627\u062A \u0627\u0644\u0633\u0644\u0627\u0645\u0629 \u0628\u0627\u062E\u062A\u0644\u0627\u0641 \u062A\u0643\u0648\u064A\u0646 \u0627\u0644\u0636\u064A\u0648\u0641\u060C \u0648\u0645\u0646 \u0645\u0633\u0624\u0648\u0644\u064A\u0629 \u0627\u0644\u0645\u0633\u062A\u0636\u064A\u0641 \u0627\u0644\u0627\u0633\u062A\u0639\u062F\u0627\u062F \u0644\u0627\u0633\u062A\u0642\u0628\u0627\u0644 \u
