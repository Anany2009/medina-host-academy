u064A\u064F\u0639\u0631\u0636 \u0639\u0646 \u0627\u0644\u0645\u0646\u0632\u0644 \u0648\u0627\u0644\u062E\u062F\u0645\u0627\u062A \u064A\u062C\u0628 \u0623\u0646 \u064A\u0637\u0627\u0628\u0642 \u0627\u0644\u0648\u0627\u0642\u0639 \u062A\u0645\u0627\u0645\u064B\u0627 \u2014 \u0627\u0644\u0635\u0648\u0631\u060C \u0627\u0644\u0648\u0635\u0641\u060C \u0627\u0644\u0645\u0631\u0627\u0641\u0642\u060C \u0627\u0644\u0645\u0633\u0627\u0641\u0629 \u0645\u0646 \u0627\u0644\u062D\u0631\u0645\u060C \u0643\u0644 \u0630\u0644\u0643 \u064A\u062C\u0628 \u0623\u0646 \u064A\u0643\u0648\u0646 \u062F\u0642\u064A\u0642\u064B\u0627 \u0648\u0635\u0627\u062F\u0642\u064B\u0627 \u0628\u0646\u0633\u0628\u0629 100%.","\u0627\u0644\u0643\u0631\u0645 (Generosity): \u0627\u0644\u0643\u0631\u0645 \u0647\u0648 \u062C\u0648\u0647\u0631 \u0627\u0644\u0636\u064A\u0627\u0641\u0629 \u0627\u0644\u0639\u0631\u0628\u064A\u0629 \u0648\u0627\u0644\u0625\u0633\u0644\u0627\u0645\u064A\u0629. \u062A\u0642\u062F\u064A\u0645 \u0645\u0627 \u0647\u0648 \u0623\u0643\u062B\u0631 \u0645\u0646 \u0627\u0644\u0645\u062A\u0648\u0642\u0639 \u2014 \u062F\u0648\u0646 \u062A\u0643\u0644\u0651\u0641 \u0623\u0648 \u0625\u062D\u0631\u0627\u062C \u0644\u0644\u0636\u064A\u0641 \u0623\u0648 \u0644\u0644\u0645\u0633\u062A\u0636\u064A\u0641 \u2014 \u0647\u0648 \u0645\u0627 \u064A\u0645\u064A\u0632 \u062A\u062C\u0631\u0628\u0629 Medina Homestays.","\u0627\u0644\u0623\u0645\u0627\u0646\u0629 (Integrity): \u0627\u0644\u062A\u0639\u0627\u0645\u0644 \u0627\u0644\u0645\u0627\u0644\u064A \u0627\u0644\u0634\u0641\u0627\u0641\u060C \u0627\u0644\u0627\u0644\u062A\u0632\u0627\u0645 \u0628\u0627\u0644\u0623\u0633\u0639\u0627\u0631 \u0627\u0644\u0645\u0639\u0644\u0646\u0629\u060C \u0639\u062F\u0645 \u0641\u0631\u0636 \u0631\u0633\u0648\u0645 \u0645\u0641\u0627\u062C\u0626\u0629\u060C \u0648\u0627\u0644\u062D\u0641\u0627\u0638 \u0639\u0644\u0649 \u0623\u0645\u0627\u0646\u0627\u062A \u0627\u0644\u0636\u064A\u0648\u0641 \u0648\u0645\u0645\u062A\u0644\u0643\u0627\u062A\u0647\u0645.","\u0627\u0644\u0627\u062D\u062A\u0631\u0627\u0645 \u0627\u0644\u0645\u062A\u0628\u0627\u062F\u0644 (Mutual Respect): \u0627\u062D\u062A\u0631\u0627\u0645 \u062E\u0635\u0648\u0635\u064A\u0629 \u0627\u0644\u0636\u064A\u0641 \u0648\u0639\u0642\u064A\u062F\u062A\u0647 \u0648\u0639\u0627\u062F\u0627\u062A\u0647\u060C \u0645\u0639 \u062A\u0648\u0642\u0639 \u0627\u062D\u062A\u0631\u0627\u0645 \u0645\u0645\u0627\u062B\u0644 \u0644\u0642\u0648\u0627\u0639\u062F \u0627\u0644\u0645\u0646\u0632\u0644 \u0648\u0639\u0627\u062F\u0627\u062A \u0627\u0644\u0623\u0633\u0631\u0629 \u0627\u0644\u0645\u0633\u062A\u0636\u064A\u0641\u0629.","\u0627\u0644\u062C\u0648\u062F\u0629 (Quality): \u0627\u0644\u0627\u0644\u062A\u0632\u0627\u0645 \u0627\u0644\u0645\u0633\u062A\u0645\u0631 \u0628\u0631\u0641\u0639 \u0645\u0633\u062A\u0648\u0649 \u0627\u0644\u062E\u062F\u0645\u0629\u060C \u0627\u0644\u0646\u0638\u0627\u0641\u0629\u060C \u0648\u0627\u0644\u062A\u062C\u0631\u0628\u0629 \u0627\u0644\u0639\u0627\u0645\u0629\u060C \u0628\u0627\u0639\u062A\u0628\u0627\u0631\u0647\u0627 \u062B\u0642\u0627\u0641\u0629 \u0644\u0627 \u062A\u062A\u0648\u0642\u0641 \u0639\u0646\u062F \u0627\u0644\u062D\u0635\u0648\u0644 \u0639\u0644\u0649 \u0627\u0644\u0627\u0639\u062A\u0645\u0627\u062F.","\u0647\u0630\u0647 \u0627\u0644\u0642\u064A\u0645 \u0627\u0644\u062E\u0645\u0633 \u0644\u064A\u0633\u062A \u0634\u0639\u0627\u0631\u0627\u062A \u062A\u0633\u0648\u064A\u0642\u064A\u0629 \u0641\u0642\u0637 \u2014 \u0628\u0644 \u0647\u064A \u0627\u0644\u0645\u0639\u064A\u0627\u0631 \u0627\u0644\u0630\u064A \u064A\u064F\u0642\u0627\u0633 \u0639\u0644\u064A\u0647 \u0623\u062F\u0627\u0624\u0643 \u0643\u0645\u0633\u062A\u0636\u064A\u0641\u060C \u0648\u0633\u062A\u0638\u0647\u0631 \u0645\u0631\u0627\u0631\u064B\u0627 \u0641\u064A \u0627\u0644\u0645\u062D\u0627\u0648\u0631 \u0627\u0644\u0642\u0627\u062F\u0645\u0629 \u0643\u0623\u0633\u0627\u0633 \u0644\u0643\u0644 \u0642\u0631\u0627\u0631 \u0639\u0645\u0644\u064A."]},{id:"1-3",title:"\u0645\u064A\u062B\u0627\u0642 \u0623\u062E\u0644\u0627\u0642\u064A\u0627\u062A \u0627\u0644\u0645\u0633\u062A\u0636\u064A\u0641",durationMin:12,body:["\u064A\u0644\u062A\u0632\u0645 \u0643\u0644 \u0645\u0633\u062A\u0636\u064A\u0641 \u0645\u0639\u062A\u0645\u062F \u0639\u0644\u0649 \u0645\u0646\u0635\u0629 Medina Homestays \u0628\u0627\u0644\u062A\u0648\u0642\u064A\u0639 \u0639\u0644\u0649 \u0627\u0644\u0645\u064A\u062B\u0627\u0642 \u0627\u0644\u062A\u0627\u0644\u064A \u0643\u0634\u0631\u0637 \u0623\u0633\u0627\u0633\u064A \u0644\u0644\u062D\u0635\u0648\u0644 \u0639\u0644\u0649 \u0627\u0644\u0627\u0639\u062A\u0645\u0627\u062F. \u0627\u0642\u0631\u0623 \u0643\u0644 \u0628\u0646\u062F \u0628\u0639\u0646\u0627\u064A\u0629\u060C \u0644\u0623\u0646\u0643 \u0633\u062A\u064F\u0637\u0627\u0644\u064E\u0628 \u0628\u0627\u0644\u062A\u0648\u0642\u064A\u0639 \u0639\u0644\u064A\u0647 \u0625\u0644\u0643\u062A\u0631\u0648\u0646\u064A\u064B\u0627 \u0641\u064A \u0646\u0647\u0627\u064A\u0629 \u0647\u0630\u0627 \u0627\u0644\u0645\u062D\u0648\u0631.","1. \u0627\u0644\u0627\u0644\u062A\u0632\u0627\u0645 \u0628\u0627\u0644\u0634\u0641\u0627\u0641\u064A\u0629 \u0627\u0644\u0643\u0627\u0645\u0644\u0629 \u0641\u064A \u0648\u0635\u0641 \u0627\u0644\u0645\u0633\u0643\u0646 \u0648\u0627\u0644\u062E\u062F\u0645\u0627\u062A \u0648\u0627\u0644\u0623\u0633\u0639\u0627\u0631\u060C \u062F\u0648\u0646 \u0623\u064A \u0645\u0628\u0627\u0644\u063A\u0629 \u0623\u0648 \u0625\u062E\u0641\u0627\u0621 \u0644\u0645\u0639\u0644\u0648\u0645\u0627\u062A \u062C\u0648\u0647\u0631\u064A\u0629.","2. \u0639\u062F\u0645 \u0627\u0644\u062A\u0645\u064A\u064A\u0632 \u0628\u064A\u0646 \u0627\u0644\u0636\u064A\u0648\u0641 \u0639\u0644\u0649 \u0623\u0633\u0627\u0633 \u0627\u0644\u062C\u0646\u0633\u064A\u0629\u060C \u0627\u0644\u0639\u0631\u0642\u060C \u0623\u0648 \u0623\u064A \u0645\u0639\u064A\u0627\u0631 \u063A\u064A\u0631 \u0645\u062A\u0639\u0644\u0642 \u0628\u0642\u0648\u0627\u0639\u062F \u0627\u0644\u0645\u0646\u0632\u0644 \u0627\u0644\u0645\u0639\u0644\u0646\u0629.","3. \u0627\u062D\u062A\u0631\u0627\u0645 \u062E\u0635\u0648\u0635\u064A\u0629 \u0627\u0644\u0636\u064A\u0641 \u0627\u0644\u0643\u0627\u0645\u0644\u0629\u060C \u0648\u0639\u062F\u0645 \u0627\u0644\u062F\u062E\u0648\u0644 \u0625\u0644\u0649 \u0645\u0633\u0627\u062D\u062A\u0647 \u0627\u0644\u062E\u0627\u0635\u0629 \u062F\u0648\u0646 \u0625\u0630\u0646 \u0635\u0631\u064A\u062D.","4. \u0627\u0644\u062D\u0641\u0627\u0638 \u0639\u0644\u0649 \u0623\u0639\u0644\u0649 \u0645\u0639\u0627\u064A\u064A\u0631 \u0627\u0644\u0633\u0644\u0627\u0645\u0629 \u0648\u0627\u0644\u0646\u0638\u0627\u0641\u0629 \u0628\u0634\u0643\u0644 \u062F\u0627\u0626\u0645\u060C \u0644\u0627 \u0641\u0642\u0637 \u0623\u062B\u0646\u0627\u0621 \u0627\u0644\u062A\u0642\u064A\u064A\u0645.","5. \u0627\u0644\u0625\u0628\u0644\u0627\u063A \u0627\u0644\u0641\u0648\u0631\u064A \u0639\u0646 \u0623\u064A \u062D\u0627\u062F\u062B\u0629 \u0633\u0644\u0627\u0645\u0629 \u0623\u0648 \u0634\u0643\u0648\u0649 \u062C\u0648\u0647\u0631\u064A\u0629 \u0644\u0641\u0631\u064A\u0642 \u0627\u0644\u0645\u0646\u0635\u0629.","6. \u0639\u062F\u0645 \u0627\u0633\u062A\u062E\u062F\u0627\u0645 \u0635\u0648\u0631 \u0623\u0648 \u0628\u064A\u0627\u0646\u0627\u062A \u0627\u0644\u0636\u064A\u0648\u0641 \u0644\u0623\u064A \u063A\u0631\u0636 \u062E\u0627\u0631\u062C \u0646\u0637\u0627\u0642 \u062A\u0642\u062F\u064A\u0645 \u0627\u0644\u062E\u062F\u0645\u0629 \u0627\u0644\u0645\u062A\u0641\u0642 \u0639\u0644\u064A\u0647\u0627.","7. \u0627\u0644\u0627\u0644\u062A\u0632\u0627\u0645 \u0628\u0642\u064A\u0645 \u0627\u0644\u0636\u064A\u0627\u0641\u0629 \u0627\u0644\u0625\u0633\u0644\u0627\u0645\u064A\u0629 \u0648\u0622\u062F\u0627\u0628 \u0627\u0644\u0645\u062F\u064A\u0646\u0629 \u0627\u0644\u0645\u0646\u0648\u0631\u0629 \u0641\u064A \u0643\u0644 \u062A\u0639\u0627\u0645\u0644 \u0645\u0639 \u0627\u0644\u0632\u0648\u0627\u0631.","8. \u0627\u0644\u0627\u0633\u062A\u0645\u0631\u   *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f5f0e8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;font-family:'Tajawal',Tahoma,sans-serif}
  .cert{
    width:297mm;max-width:100%;
    background:linear-gradient(145deg,#fdf8f0 0%,#f9f3e5 100%);
    border:3px solid #c9a14a;
    outline:8px solid #1B4D4A;
    outline-offset:-18px;
    border-radius:4px;
    padding:36px 44px 32px;
    position:relative;
    overflow:hidden;
    box-shadow:0 8px 40px rgba(0,0,0,0.15);
  }
  /* Corner ornaments */
  .corner{position:absolute;width:60px;height:60px;opacity:.5}
  .corner svg{width:100%;height:100%}
  .tl{top:8px;right:8px}
  .tr{top:8px;left:8px;transform:scaleX(-1)}
  .bl{bottom:8px;right:8px;transform:scaleY(-1)}
  .br{bottom:8px;left:8px;transform:scale(-1)}
  /* Watermark */
  .wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.04;font-size:120px;white-space:nowrap;color:#1B4D4A;font-weight:800;pointer-events:none}
  /* Mosque watermark right */
  .mosque-wm{position:absolute;left:20px;top:50%;transform:translateY(-50%);opacity:.05;width:160px}
  /* Header */
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
  .header-center{text-align:center;flex:1}
  .logo{height:56px;object-fit:contain}
  .medina-box{background:linear-gradient(135deg,#1B4D4A,#0d2b28);border-radius:8px;padding:10px 14px;text-align:center;color:#c9a14a;font-size:11px;min-width:100px}
  .medina-box .city{font-size:13px;font-weight:800;margin-bottom:4px}
  .cert-badge{width:80px;text-align:center}
  .badge-circle{width:76px;height:76px;border-radius:50%;border:3px solid #c9a14a;background:linear-gradient(135deg,#1B4D4A,#0d2b28);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#c9a14a;margin:0 auto}
  .badge-circle .btext{font-size:11px;font-weight:800;line-height:1.2}
  .stars{color:#c9a14a;font-size:10px;margin-top:2px}
  /* Title */
  .cert-title{font-family:'Amiri',serif;font-size:38px;font-weight:700;color:#1B4D4A;text-align:center;line-height:1.3;margin:10px 0 4px}
  .cert-subtitle{font-family:'Amiri',serif;font-size:20px;color:#2d5a4f;text-align:center;margin-bottom:8px}
  .gold-divider{display:flex;align-items:center;gap:12px;margin:8px 0}
  .gold-divider hr{flex:1;border:none;border-top:1.5px solid #c9a14a;opacity:.6}
  .gold-divider span{color:#c9a14a;font-size:14px}
  .program-tag{text-align:center;font-size:11px;letter-spacing:3px;color:#c9a14a;margin-bottom:14px}
  /* Name area */
  .testify{text-align:center;font-size:14px;color:#444;margin-bottom:6px}
  .host-name-line{border-bottom:1.5px dotted #c9a14a;margin:0 40px 4px;min-height:32px;display:flex;align-items:center;justify-content:center}
  .host-name{font-family:'Amiri',serif;font-size:28px;font-weight:700;color:#1B4D4A;text-align:center}
  /* Body text */
  .body-text{font-family:'Amiri',serif;font-size:15px;color:#333;text-align:center;line-height:2;margin:12px 60px}
  /* Icons row */
  .icons-row{display:flex;justify-content:center;gap:0;margin:14px 0;border-top:1px solid rgba(201,161,74,.3);border-bottom:1px solid rgba(201,161,74,.3);padding:12px 0}
  .icon-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;border-right:1px solid rgba(201,161,74,.25)}
  .icon-item:last-child{border-right:none}
  .icon-circle{width:38px;height:38px;border-radius:50%;border:1.5px solid #c9a14a;display:flex;align-items:center;justify-content:center;color:#c9a14a;font-size:16px}
  .icon-label{font-size:10px;color:#555;text-align:center}
  /* Footer */
  .footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:10px}
  .sig-area{text-align:center;flex:1}
  .sig-line{border-bottom:1px solid #888;width:140px;margin:0 auto 4px}
  .sig-text{font-size:10px;color:#666;line-height:1.5}
  .center-seal{text-align:center;flex:1}
  .seal{width:90px;height:90px;border-radius:50%;border:3px solid #c9a14a;background:radial-gradient(circle,#1B4D4A,#0d2b28);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto;color:#c9a14a}
  .seal-title{font-size:9px;font-weight:800;text-align:center;line-height:1.3}
  .seal-stars{font-size:11px;margin-top:3px}
  .cert-info{flex:1;text-align:right}
  .info-row{display:flex;align-items:center;gap:6px;font-size:10.5px;color:#444;margin-bottom:5px;justify-content:flex-end}
  .info-label{color:#1B4D4A;font-weight:700;min-width:70px;text-align:right}
  .info-val{color:#333;min-width:100px}
  @media print{
    body{background:white;padding:0}
    .cert{box-shadow:none;outline-offset:-16px;width:100%}
  }
</style>
</head>

<div class="cert">
  <!-- Watermark -->
  <div class="wm">\u2726</div>

  <!-- Corner ornaments -->
  <div class="corner tl"><svg viewBox="0 0 60 60" fill="none"><path d="M2,2 L58,2 L58,12 M2,2 L2,58 L12,58" stroke="#c9a14a" stroke-width="2"/><path d="M8,8 L52,8 L52,16 M8,8 L8,52 L16,52" stroke="#c9a14a" stroke-width="1" opacity=".5"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 60 60" fill="none"><path d="M2,2 L58,2 L58,12 M2,2 L2,58 L12,58" stroke="#c9a14a" stroke-width="2"/><path d="M8,8 L52,8 L52,16 M8,8 L8,52 L16,52" stroke="#c9a14a" stroke-width="1" opacity=".5"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 60 60" fill="none"><path d="M2,2 L58,2 L58,12 M2,2 L2,58 L12,58" stroke="#c9a14a" stroke-width="2"/><path d="M8,8 L52,8 L52,16 M8,8 L8,52 L16,52" stroke="#c9a14a" stroke-width="1" opacity=".5"/></svg></div>

  <!-- Header -->
  <div class="header">
    <div class="cert-badge">
      <div class="badge-circle">
        <div class="btext">\u0645\u0633\u062A\u0636\u064A\u0641<br/>\u0645\u0639\u062A\u0645\u062F</div>
        <div class="stars">\u2605\u2605\u2605\u2605\u2605</div>

    <div class="medina-box">

      <div>\u0634\u0631\u0641 \u0627\u0644\u062E\u062F\u0645\u0629</div>
      <div>\u0639\u0638\u0645 \u0627\u0644\u0645\u0633\u0624\u0648\u0644\u064A\u0629</div>

  </div>

    <div class="icon-item"><div class="icon-circle">\u{1F4D6}</div><div class="icon-label">\u0627\u0644\u062A\u062C\u0631\u0628\u0629 \u0627\u0644\u0631\u0648\u062D\u0627\u0646\u064A\u0629</div></div>
  </div>
