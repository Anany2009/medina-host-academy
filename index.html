            "\u0627\u0644\u0631\u062F \u0639\u0644\u0649 \u0627\u0633\u062A\u0641\u0633\u0627\u0631\u0627\u062A \u0627\u0644\u0636\u064A\u0648\u0641 \u062E\u0644\u0627\u0644 \u0633\u0627\u0639\u0629 \u0648\u0627\u062D\u062F\u0629 \u0643\u062D\u062F \u0623\u0642\u0635\u0649 \u062E\u0644\u0627\u0644 \u0633\u0627\u0639\u0627\u062A \u0627\u0644\u0646\u0634\u0627\u0637 \u0627\u0644\u0645\u0639\u062A\u0627\u062F\u0629.",
            "\u0627\u0633\u062A\u062E\u062F\u0627\u0645 \u0646\u063A\u0645\u0629 \u0648\u062F\u0648\u062F\u0629\u060C \u0648\u0627\u0636\u062D\u0629\u060C \u0648\u0645\u0647\u0646\u064A\u0629 \u0641\u064A \u062C\u0645\u064A\u0639 \u0627\u0644\u0631\u0633\u0627\u0626\u0644 \u2014 \u0628\u0627\u0644\u0639\u0631\u0628\u064A\u0629 \u0648\u0627\u0644\u0625\u0646\u062C\u0644\u064A\u0632\u064A\u0629 \u062D\u0633\u0628 \u0644\u063A\u0629 \u0627\u0644\u0636\u064A\u0641.",
            "\u062A\u062C\u0646\u0628 \u0627\u0644\u0631\u062F\u0648\u062F \u0627\u0644\u0645\u0642\u062A\u0636\u0628\u0629 \u062C\u062F\u064B\u0627 \u0623\u0648 \u0627\u0644\u0628\u0627\u0631\u062F\u0629 \u0627\u0644\u062A\u064A \u0642\u062F \u062A\u064F\u0641\u0647\u0645 \u0643\u0639\u062F\u0645 \u0627\u0647\u062A\u0645\u0627\u0645 \u0645\u0646 \u0627\u0644\u0636\u064A\u0641.",
            "\u062A\u0623\u0643\u064A\u062F \u0643\u0644 \u0627\u0644\u062A\u0641\u0627\u0635\u064A\u0644 \u0627\u0644\u0645\u0647\u0645\u0629 \u0643\u062A\u0627\u0628\u064A\u064B\u0627 (\u0648\u0642\u062A \u0627\u0644\u0648\u0635\u0648\u0644\u060C \u0639\u062F\u062F \u0627\u0644\u0623\u0634\u062E\u0627\u0635\u060C \u0623\u064A \u0637\u0644\u0628\u0627\u062A \u062E\u0627\u0635\u0629) \u0644\u062A\u062C\u0646\u0628 \u0623\u064A \u0633\u0648\u0621 \u062A\u0641\u0627\u0647\u0645 \u0644\u0627\u062D\u0642\u064B\u0627."
          ]
        },
        {
          id: "5-2",
          title: "\u0625\u062F\u0627\u0631\u0629 \u0627\u0644\u0634\u0643\u0627\u0648\u0649 \u0648\u062D\u0644 \u0627\u0644\u0645\u0634\u0643\u0644\u0627\u062A",
          durationMin: 15,
          body: [
            "\u0643\u0644 \u0634\u0643\u0648\u0649 \u0647\u064A \u0641\u0631\u0635\u0629 \u0644\u0625\u062B\u0628\u0627\u062A \u0627\u062D\u062A\u0631\u0627\u0641\u064A\u062A\u0643\u060C \u0625\u0630\u0627 \u062A\u0645 \u0627\u0644\u062A\u0639\u0627\u0645\u0644 \u0645\u0639\u0647\u0627 \u0628\u0627\u0644\u0645\u0646\u0647\u062C\u064A\u0629 \u0627\u0644\u0635\u062D\u064A\u062D\u0629. \u0627\u062A\u0628\u0639 \u0647\u0630\u0647 \u0627\u0644\u062E\u0637\u0648\u0627\u062A \u0627\u0644\u062E\u0645\u0633 \u0628\u0627\u0644\u062A\u0631\u062A\u064A\u0628:",
            "\u0623\u0648\u0644\u064B\u0627: \u0627\u0644\u0627\u0633\u062A\u0645\u0627\u0639 \u0627\u0644\u0643\u0627\u0645\u0644 \u0644\u0634\u0643\u0648\u0649 \u0627\u0644\u0636\u064A\u0641 \u062F\u0648\u0646 \u0645\u0642\u0627\u0637\u0639\u0629 \u0623\u0648 \u062A\u0628\u0631\u064A\u0631 \u0641\u0648\u0631\u064A.",
            "\u062B\u0627\u0646\u064A\u064B\u0627: \u0625\u0638\u0647\u0627\u0631 \u0627\u0644\u062A\u0641\u0647\u0645 \u0628\u0639\u0628\u0627\u0631\u0629 \u0645\u062B\u0644: '\u0623\u062A\u0641\u0647\u0645 \u0634\u0639\u0648\u0631\u0643\u0645\u060C \u0648\u0623\u0642\u062F\u0651\u0631 \u062A\u0648\u0627\u0635\u0644\u0643\u0645 \u0645\u0639\u0646\u0627 \u0628\u0634\u0623\u0646 \u0647\u0630\u0627 \u0627\u0644\u0623\u0645\u0631.'",
            "\u062B\u0627\u0644\u062B\u064B\u0627: \u062A\u0642\u062F\u064A\u0645 \u062D\u0644 \u0639\u0645\u0644\u064A \u0648\u0641\u0648\u0631\u064A \u0625\u0646 \u0623\u0645\u0643\u0646 (\u062A\u0639\u062F\u064A\u0644\u060C \u062E\u062F\u0645\u0629 \u0625\u0636\u0627\u0641\u064A\u0629\u060C \u062A\u0648\u0636\u064A\u062D).",
            "\u0631\u0627\u0628\u0639\u064B\u0627: \u0641\u064A \u062D\u0627\u0644 \u062A\u062C\u0627\u0648\u0632 \u0627\u0644\u062D\u0644 \u0642\u062F\u0631\u0629 \u0627\u0644\u0645\u0633\u062A\u0636\u064A\u0641\u060C \u0627\u0644\u062A\u0635\u0639\u064A\u062F \u0627\u0644\u0641\u0648\u0631\u064A \u0644\u0641\u0631\u064A\u0642 \u062F\u0639\u0645 \u0627\u0644\u0645\u0646\u0635\u0629 \u062F\u0648\u0646 \u062A\u062C\u0627\u0647\u0644 \u0627\u0644\u0636\u064A\u0641 \u0623\u0648 \u062A\u0623\u062C\u064A\u0644 \u0627\u0644\u0631\u062F.",
            "\u062E\u0627\u0645\u0633\u064B\u0627: \u0627\u0644\u0645\u062A\u0627\u0628\u0639\u0629 \u0628\u0639\u062F \u062D\u0644 \u0627\u0644\u0645\u0634\u0643\u0644\u0629 \u0644\u0644\u062A\u0623\u0643\u062F \u0645\u0646 \u0631\u0636\u0627 \u0627\u0644\u0636\u064A\u0641 \u0627\u0644\u0641\u0639\u0644\u064A\u060C \u0644\u0627 \u0641\u0642\u0637 \u0625\u063A\u0644\u0627\u0642 \u0627\u0644\u0645\u062D\u0627\u062F\u062B\u0629."
          ]
        },
        {
          id: "5-3",
          title: "\u0627\u0644\u062A\u0639\u0627\u0645\u0644 \u0645\u0639 \u0627\u0644\u0636\u064A\u0641 \u0627\u0644\u063A\u0627\u0636\u0628",
          durationMin: 13,
          body: [
            "\u0627\u0644\u0636\u064A\u0641 \u0627\u0644\u063A\u0627\u0636\u0628 \u064A\u062D\u062A\u0627\u062C \u0623\u0648\u0644\u064B\u0627 \u0625\u0644\u0649 \u0623\u0646 \u064A\u0634\u0639\u0631 \u0628\u0623\u0646\u0647 \u0645\u0633\u0645\u0648\u0639\u060C \u0642\u0628\u0644 \u0623\u064A \u062D\u0644 \u0639\u0645\u0644\u064A. \u0647\u0630\u0647 \u0627\u0644\u0642\u0648\u0627\u0639\u062F \u062A\u0633\u0627\u0639\u062F\u0643 \u0639\u0644\u0649 \u0625\u062F\u0627\u0631\u0629 \u0647\u0630\u0647 \u0627\u0644\u0644\u062D\u0638\u0627\u062A \u0628\u062B\u0642\u0629:",
            "\u062A\u0647\u062F\u0626\u0629 \u0627\u0644\u0646\u0641\u0633 \u0623\u0648\u0644\u064B\u0627 \u2014 \u0644\u0627 \u064A\u064F\u0633\u0645\u062D \u0628\u0627\u0644\u0631\u062F \u0628\u0627\u0646\u0641\u0639\u0627\u0644 \u0645\u0645\u0627\u062B\u0644 \u062A\u062D\u062A \u0623\u064A \u0638\u0631\u0641\u060C \u0628\u063A\u0636 \u0627\u0644\u0646\u0638\u0631 \u0639\u0646 \u0623\u0633\u0644\u0648\u0628 \u0627\u0644\u0636\u064A\u0641.",
            "\u0639\u062F\u0645 \u0627\u0644\u062F\u062E\u0648\u0644 \u0641\u064A \u0646\u0642\u0627\u0634 \u062D\u0648\u0644 '\u0645\u0646 \u0627\u0644\u0645\u062E\u0637\u0626' \u0623\u0645\u0627\u0645 \u0627\u0644\u0636\u064A\u0641\u061B \u0627\u0644\u062A\u0631\u0643\u064A\u0632 \u064A\u0643\u0648\u0646 \u062F\u0627\u0626\u0645\u064B\u0627 \u0639\u0644\u0649 \u0627\u0644\u062D\u0644 \u0644\u0627 \u0639\u0644\u0649 \u0625\u062B\u0628\u0627\u062A \u0627\u0644\u0635\u0648\u0627\u0628.",
            "\u062A\u0642\u062F\u064A\u0645 \u0627\u0639\u062A\u0630\u0627\u0631 \u0639\u0646 \u0633\u0648\u0621 \u0627\u0644\u062A\u062C\u0631\u0628\u0629 (\u062F\u0648\u0646 \u0627\u0644\u0625\u0642\u0631\u0627\u0631 \u0628\u0645\u0633\u0624\u0648\u0644\u064A\u0629 \u0642\u0627\u0646\u0648\u0646\u064A\u0629 \u0645\u062D\u062F\u062F\u0629)\u060C \u0645\u062B\u0644: '\u0646\u0623\u0633\u0641 \u0644\u0623\u0646 \u0647\u0630\u0627 \u0644\u0645 \u064A\u0643\u0646 \u0628\u0645\u0633\u062A\u0648\u0649 \u062A\u0648\u0642\u0639\u0627\u062A\u0643\u0645\u060C \u0648\u0633\u0646\u0639\u0645\u0644 \u0639\u0644\u0649 \u0630\u0644\u0643 \u0641\u0648\u0631\u064B\u0627.'",
            "\u062A\u0648\u062B\u064A\u0642 \u0627\u0644\u0648\u0627\u0642\u0639\u0629 \u0643\u062A\u0627\u0628\u064A\u064B\u0627 \u0641\u0648\u0631 \u0627\u0646\u062A\u0647\u0627\u0626\u0647\u0627\u060C \u0628\u0634\u0643\u0644 \u0645\u0648\u0636\u0648\u0639\u064A\u060C \u0644\u0623\u063A\u0631\u0627\u0636 \u0627\u0644\u0645\u0631\u0627\u062C\u0639\u0629 \u0645\u0646 \u0641\u0631\u064A\u0642 \u0627\u0644\u062C\u0648\u062F\u0629.",
            "\u0639\u062F\u0645 \u062A\u0642\u062F\u064A\u0645 \u0623\u064A \u0648\u0639\u0648\u062F \u0628\u062A\u0639\u0648\u064A\u0636\u0627\u062A \u0645\u0627\u0644\u064A\u0629 \u0634\u062E\u0635\u064A\u0629 \u062F\u0648\u0646 \u0627\u0644\u0631\u062C\u0648\u0639 \u0644\u0633\u064A\u0627\u0633\u0629 \u0627\u0644\u0645\u0646\u0635\u0629 \u0627\u0644\u0631\u0633\u0645\u064A\u0629 \u2014 \u0647\u0630\u0627 \u064A\u062D\u0645\u064A \u0627\u0644\u0645\u0633\u062A\u0636\u064A\u0641 \u0645\u0646 \u0627\u0644\u062A\u0632\u0627\u0645\u0627\u062A \u0644\u0627 \u064A\u0645\u0643\u0646\u0647 \u0627\u0644\u0648\u0641\u0627\u0621 \u0628\u0647\u0627."
          ]
        }

        {
          id: "6-1",
          title: "\u0627\u0633\u062A\u0642\u0628\u0627\u0644 \u0636\u064A\u0648\u0641 \u0645\u0646 \u0623\u0645\u0631\u064A\u0643\u0627 \u0648\u0623\u0648\u0631\u0648\u0628\u0627",
          durationMin: 18,
          body: [
            "\u064A\u0647\u062F\u0641 \u0647\u0630\u0627 \u0627\u0644\u062F\u0631\u0633 \u0625\u0644\u0649 \u062A\u0632\u0648\u064A\u062F\u0643 \u0628\u0641\u0647\u0645 \u0639\u0645\u0644\u064A \u0644\u0644\u0641\u0631\u0648\u0642\u0627\u062A \u0627\u0644\u062B\u0642\u0627\u0641\u064A\u0629 \u0628\u064A\u0646 \u0627\u0644\u0632\u0648\u0627\u0631 \u0645\u0646 \u0645\u0646\u0627\u0637\u0642 \u0645\u062E\u062A\u0644\u0641\u0629 \u0645\u0646 \u0627\u0644\u0639\u0627\u0644\u0645\u060C \u0628\u0645\u0627 \u064A\u0633\u0627\u0639\u062F\u0643 \u0639\u0644\u0649 \u062A\u0642\u062F\u064A\u0645 \u062A\u062C\u0631\u0628\u0629 \u062A\u0646\u0627\u0633\u0628 \u062A\u0648\u0642\u0639\u0627\u062A \u0643\u0644 \u0636\u064A\u0641 \u062F\u0648\u0646 \u0623\u064A \u062A\u0646\u0627\u0632\u0644 \u0639\u0646 \u0647\u0648\u064A\u0629 \u0627\u0644\u0645\u0643\u0627\u0646.",
            "\u0636\u064A\u0648\u0641 \u0645\u0646 \u0623\u0645\u0631\u064A\u0643\u0627 \u0627\u0644\u0634\u0645\u0627\u0644\u064A\u0629: \u064A\u0642\u062F\u0651\u0631\u0648\u0646 \u0628\u0634\u062F\u0629 \u0627\u0644\u062E\u0635\u0648\u0635\u064A\u0629 \u0648\u0627\u0644\u0645\u0633\u0627\u062D\u0629 \u0627\u0644\u0634\u062E\u0635\u064A\u0629 \u2014 \u062A\u062C\u0646\u0628 \u0627\u0644\u0632\u064A\u0627\u0631\u0627\u062A \u0627\u0644\u0645\u062A\u0643\u0631\u0631\u0629 \u0644\u063A\u0631\u0641\u0647\u0645 \u062F\u0648\u0646 \u0645\u0648\u0639\u062F.",
            "\u064A\u0641\u0636\u0644 \u0636\u064A\u0648\u0641 \u0623\u0645\u0631\u064A\u0643\u0627 \u0627\u0644\u0634\u0645\u0627\u0644\u064A\u0629 \u0627\u0644\u062A\u0648\u0627\u0635\u0644 \u0627\u0644\u0645\u0628\u0627\u0634\u0631 \u0648\u0627\u0644\u0648\u0627\u0636\u062D\u060C \u0648\u064A\u062A\u0648\u0642\u0639\u0648\u0646 \u0625\u062C\u0627\u0628\u0627\u062A \u0635\u0631\u064A\u062D\u0629 \u0639\u0646 \u0627\u0644\u0623\u0633\u0626\u0644\u0629 \u0627\u0644\u0639\u0645\u0644\u064A\u0629 (\u0627\u0644\u0648\u0627\u064A \u0641\u0627\u064A\u060C \u0627\u0644\u0645\u0648\u0627\u0635\u0644\u0627\u062A\u060C \u0627\u0644\u0623\u0633\u0639\u0627\u0631).",
            "\u0627\u0644\u0627\u0644\u062A\u0632\u0627\u0645 \u0628\u0627\u0644\u0648\u0642\u062A \u0645\u0647\u0645 \u062C\u062F\u064B\u0627 \u0628\u0627\u0644\u0646\u0633\u0628\u0629 \u0644\u0647\u0645 \u2014 \u0627\u0644\u062A\u0623\u062E\u064A\u0631 \u0639\u0646 \u0627\u0644\u0645\u0648\u0627\u0639\u064A\u062F \u0627\u0644\u0645\u062A\u0641\u0642 \u0639\u0644\u064A\u0647\u0627 \u0642\u062F \u064A\u064F\u062A\u0631\u062C\u0645 \u0644\u0627\u0646\u0637\u0628\u0627\u0639 \u0633\u0644\u0628\u064A \u0642\u0648\u064A.",
